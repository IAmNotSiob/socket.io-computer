services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    command: npm run start:web
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      COMPUTER_REDIS_URI: redis:6379
      COMPUTER_IO_URL: ${COMPUTER_IO_URL:-http://localhost:6001}
      COMPUTER_IO_WEB_PORT: 5000
    ports:
      - "${COMPUTER_WEB_HOST_PORT:-5000}:5000"

  io:
    build: .
    command: npm run start:io
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      COMPUTER_REDIS_URI: redis:6379
      COMPUTER_IO_PORT: 6001
    ports:
      - "${COMPUTER_IO_HOST_PORT:-6001}:6001"

  presence:
    build: .
    command: npm run start:presence
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      COMPUTER_REDIS_URI: redis:6379

  qemu:
    build: .
    command: npm run start:qemu
    restart: unless-stopped
    environment:
      COMPUTER_IMG: /data/disk.qcow2
      COMPUTER_VNC_HOST: 0.0.0.0
      COMPUTER_DISPLAY: "0"
      COMPUTER_TCP: 0.0.0.0:4444
    volumes:
      - ./images:/data

  emu:
    build: .
    command: npm run start:emu
    restart: unless-stopped
    depends_on:
      - redis
      - qemu
    environment:
      COMPUTER_REDIS_URI: redis:6379
      COMPUTER_IMG: /data/disk.qcow2
      COMPUTER_VNC_HOST: qemu
      COMPUTER_DISPLAY: "0"
      COMPUTER_TCP: qemu:4444
    volumes:
      - ./images:/data
